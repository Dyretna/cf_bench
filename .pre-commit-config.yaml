repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
    -   id: check-yaml
    -   id: check-merge-conflict
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
    -   id: check-toml

# sorts imports into correct order
-   repo: https://github.com/pre-commit/mirrors-isort
    rev: v5.10.1
    hooks:
    -   id: isort
        args: ["--profile", "black"]

# sorts keys in TOML-files
-   repo: https://github.com/pappasam/toml-sort
    rev: v0.20.1
    hooks:
    -   id: toml-sort
        args: [--in-place]

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
    # Run the linter.
    -   id: ruff-check
        types_or: [python, pyi]
        args: [--fix]
    # Run the formatter.
    -   id: ruff-format
        types_or: [python, pyi]

# Note: black removed - ruff-format is the modern replacement
